name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      # Spin up a throwaway MySQL instance for integration tests.
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/test_db"
      JWT_SECRET: "github-actions-ci-secret-do-not-use-in-production"
      PORT: "3008"
      FRONTEND_URL: "http://localhost:3000"
      GOOGLE_CLIENT_ID: "fake-google-client-id"
      SUPABASE_URL: "https://fakeproject.supabase.co"
      SUPABASE_ANON_KEY: "fake-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "fake-service-role-key"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Push Database Schema
        run: npx prisma db push --accept-data-loss

      - name: Run Test Suite
        run: npm test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test  # Only deploy if ALL tests pass.

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 11050
          script: |
            cd ~/farrel-app
            git pull origin main
            docker compose up -d --build
            docker compose exec -T farrel_be npx prisma migrate deploy
